[package]
name = "bridge"
version = "0.1.0"
edition.workspace = true
license.workspace = true

[lib]
name = "bridge"
path = "src/lib.rs"

[[bin]]
name = "bridge"
path = "src/bin/bridge.rs"

[[bin]]
name = "bridge-fetch"
path = "src/bin/fetch.rs"

[dependencies]
bridge-core = { path = "../core" }
bridge-utils = { path = "../utils" }
bridge-irc = { path = "../irc" }
bridge-discord = { path = "../discord" }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "sync", "signal"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
log = "0.4"
env_logger = "0.11"
anyhow = "1"
clap = { version = "4.5.60", features = ["derive"] }

[dev-dependencies]
bridge-testing = { path = "../testing" }
tokio = { version = "1", features = ["test-util", "macros"] }
